<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainPage">
        <header>
            <img src="images/google-tasks-logo-main-icon.png" alt ="Логотип Google Tasks" class="logo">
            <h1>My tasks</h1>
        </header>
        <main>
            <div class="addTask">
                <h2 id="h2Add">Task</h2>
                <label class="labelAdd">Name</label>
                <input type="text" class="taskNameInput">
                <div class="PriorityandType">
                    <div class="PriorityTask">
                        <label class="labelPriority">Priority</label>
                        <select class="prioritySelect">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="TypeTask">
                        <label class="labelType">Type</label>
                        <select class="typeSelect">
                            <option value="Other">Other</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                </div>
                <div class="DateTask">
                    <label class="labelAdd">Date</label>
                    <input type="date" class="dateInput">
                </div>
                <div class="button">
                    <button class="addTaskButton">Add task</button>
                </div>
            </div>
            <div class="FilterTask">
                <!-- <h2 id="h2Filter">Filter Tasks</h2> -->
                <div class="filterPrioritySelect">
                    <label class="labelFilter">Priority</label>
                    <select class="filterPrioritySelect">
                        <option value="All">All</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="filterTypeSelect">
                    <label class="labelFilterType">Type</label>
                    <select class="filterTypeSelect">
                        <option value="All">All</option>
                        <option value="Other">Other</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>
                <div class="buttonFilter">
                    <button class="filterApplyButton">Apply</button>
                    <button class="filterClearButton">Clear</button>
                </div>
                <div class="poryadok_po_vazhnosti">
                    <label class="labeImportance">By importance</label>
                    <input type="checkbox" class="sortImportanceCheckbox">
                </div>
            </div>
            <div class="taskList">
                <h2 id="h2list">Task List</h2>
                <div class="tasksListContent">
                    здесь будут задачи
                </div>
            </div>
        </main>
        <footer>
        <p>Дюков Данила Иванович №2252</p>
        <p>
            <div class="socialIcons">
                <a href ="https://vk.com/unidubna_official">
                    <img src="images/вк-иконка.png" alt="Иконка вк" class="icons">
                </a>
                    
                <a href ="https://vk.com/danechka0075">
                    <img src="images/вк-иконка.png" alt="Иконка вк" class="icons">
                </a>
    
                <a href ="https://uni-dubna.ru/">
                    <img src="images/XS.webp" alt="Иконка Университета" class="icons">
                </a>
            </div>
        </p>
        <p>Университет Дубна, 2025</p>    
        </footer>
    </div>
</body>
<script src="script.js">

</script>
</html>
